<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kendra Lockard</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <canvas id="c"></canvas>
    <div class="scanlines"></div>

    <div class="ui">
      <header class="nav">
        <a href="/" class="brand hidden" id="home-link">Kendra Lockard</a>
        <ul class="nav-links">
          <li><a href="/work" id="work-link">Work</a></li>
          <li><a href="/contact" id="contact-link">Contact</a></li>
        </ul>
      </header>

      <div class="identity">
        <h1 class="name">Kendra Lockard</h1>
        <p class="role">// Software Engineer &middot; Web Developer</p>
      </div>

      <div class="reveal-stage" id="reveal-stage" aria-hidden="true">
        <p class="reveal-label" id="reveal-label"></p>
        <div class="reveal-content" id="reveal-content">
          <div class="reveal-panel" id="panel-work" data-label="// Work">
            <p class="reveal-label">// Work</p>
            <ul class="work-list">
              <li>
                <a href="https://thalolabs.com" target="_blank" rel="noopener"
                  >Thalo Labs</a
                >
                &middot; Senior Software Engineer
              </li>
              <li>
                <a href="https://www.teecom.com" target="_blank" rel="noopener"
                  >TEECOM</a
                >
                &middot; Senior Software Engineer
              </li>
              <li>
                <a href="https://www.oberlin.edu" target="_blank" rel="noopener"
                  >Oberlin College</a
                >
                &middot; Web Development Instructor
              </li>
              <li>Freelance &middot; Web Developer</li>
            </ul>
          </div>

          <div class="reveal-panel" id="panel-contact" data-label="// Contact">
            <p class="reveal-label">// Contact</p>
            <form
              name="contact"
              method="POST"
              action="/thanks/"
              data-netlify="true"
              netlify-honeypot="bot-field"
              class="contact-form"
            >
              <input type="hidden" name="form-name" value="contact" />
              <p class="hp-field">
                <label>
                  Don't fill this out if you're human:
                  <input name="bot-field" tabindex="-1" autocomplete="off" />
                </label>
              </p>
              <label>Name<input type="text" name="name" required /></label>
              <label>Email<input type="email" name="email" required /></label>
              <label
                >Message<textarea name="message" rows="5" required></textarea>
              </label>
              <button type="submit">Send</button>
            </form>
          </div>
        </div>
      </div>

      <div class="status-group">
        <div class="status-dot"></div>
        <span>ONLINE</span>
        <span id="coords">X:+0.000 &middot; Y:+0.000</span>
      </div>
    </div>

    <script src="/js/grid.js"></script>
    <script src="/js/about.js"></script>
  </body>
</html>
